version: 2

models:
  - name: bronze_date
    config:
     materialized: view

  - name: bronze_product
    config:
      materialized: view
      schema: bronze          # Can create schema in  or dbT-project.yml

  - name: bronze_sales
    columns:
      - name: sales_id
        data_tests:
         - unique
         - not_null
  - name: bronze_store
    columns:
      - name: country
        data_tests:
        - accepted_values:
              arguments:
              values: ["USA","Canada","Mexico"]
              config:
                 severity: warn
   